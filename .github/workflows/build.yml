name: Build wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      fasttext_version:
        description: fasttext version to build
        default: "0.9.3"
        required: true

env:
  FASTTEXT_VERSION: ${{ inputs.fasttext_version || '0.9.3' }}

jobs:
  build_wheels:
    name: ${{ matrix.os }} ${{ matrix.archs }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            archs: arm64
          - os: windows-latest
            archs: AMD64
          - os: ubuntu-latest
            archs: x86_64
          # Native arm64 runner — avoids 6h QEMU timeout for C++ compilation
          - os: ubuntu-24.04-arm
            archs: aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Download fasttext ${{ env.FASTTEXT_VERSION }} source from PyPI
        shell: bash
        run: |
          pip download --no-binary :all: --no-deps \
            "fasttext==${{ env.FASTTEXT_VERSION }}" -d sdist/
          mkdir fasttext-src
          tar xf sdist/fasttext-*.tar.gz -C fasttext-src --strip-components=1

      - name: Rename package to fasttext-prebuilt
        shell: python
        run: |
          import re, pathlib, shutil, os
          p = pathlib.Path('fasttext-src/setup.py')
          content = p.read_text()
          # Replace the name= argument so PyPI sees fasttext-prebuilt
          content = re.sub(r'(name\s*=\s*)["\']fasttext["\']', r'\1"fasttext-prebuilt"', content)
          # Remove fasttext.tests from installed packages — test files in
          # site-packages confuse pytest when running in projects that depend
          # on fasttext-prebuilt (fasttext/tests/__init__.py eagerly imports
          # the C extension, which breaks pytest startup).
          content = re.sub(r'\s*str\("fasttext\.tests"\),?', '', content)
          # Bump version to match the git tag (v0.9.4 → 0.9.4)
          tag = os.environ.get('GITHUB_REF', '').replace('refs/tags/v', '')
          if tag and not tag.startswith('refs/'):
              content = re.sub(r'(__version__\s*=\s*)["\'][^"\']+["\']', f'\\g<1>"{tag}"', content)
          p.write_text(content)
          shutil.rmtree('fasttext-src/python/fasttext_module/fasttext/tests', ignore_errors=True)

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: fasttext-src
          output-dir: wheelhouse
        env:
          CIBW_BUILD: "cp314-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_*"
          CIBW_ARCHS: ${{ matrix.archs }}
          # pybind11 ≥ 2.13 is required for Python 3.14 support.
          CIBW_BEFORE_BUILD: "pip install pybind11>=2.13"
          # MSVC reads the CL env var as extra flags; /std:c++17 enables string_view etc.
          # fasttext setup.py passes -std=c++17 which MSVC silently ignores.
          # ssize_t is POSIX-only; map it to Py_ssize_t which pybind11 always defines.
          CIBW_ENVIRONMENT_WINDOWS: 'CL="/std:c++17 /Dssize_t=Py_ssize_t"'
          # macOS 14 runner builds binaries targeting 14.8 — match it to satisfy delocate.
          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=14.8"
          CIBW_BUILD_VERBOSITY: 1

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ matrix.archs }}
          path: wheelhouse/*.whl

  release:
    name: GitHub release + PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-*
          merge-multiple: true
          path: dist

      - name: List wheels
        run: ls -lh dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true
          body: |
            Pre-built `fasttext-prebuilt` ${{ env.FASTTEXT_VERSION }} wheels for **Python 3.14**.

            ## Install

            ```bash
            pip install fasttext-prebuilt
            ```

            ## Platforms

            | OS | Architecture |
            |---|---|
            | Linux (manylinux) | x86_64, aarch64 |
            | macOS | arm64 |
            | Windows | AMD64 |

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI }}
          packages-dir: dist/
