name: Build wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      fasttext_version:
        description: fasttext version to build
        default: "0.9.3"
        required: true

env:
  FASTTEXT_VERSION: ${{ inputs.fasttext_version || '0.9.3' }}

jobs:
  build_wheels:
    name: ${{ matrix.os }} ${{ matrix.archs }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 on Intel runner — avoids macOS 14 SDK min-version issue
          - os: macos-13
            archs: x86_64
          # arm64 on Apple Silicon runner
          - os: macos-14
            archs: arm64
          - os: windows-latest
            archs: AMD64
          # ubuntu re-enable once mac/windows are green (linux already passes)
          # - os: ubuntu-latest
          #   archs: x86_64 aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Download fasttext ${{ env.FASTTEXT_VERSION }} source from PyPI
        shell: bash
        run: |
          pip download --no-binary :all: --no-deps \
            "fasttext==${{ env.FASTTEXT_VERSION }}" -d sdist/
          mkdir fasttext-src
          tar xf sdist/fasttext-*.tar.gz -C fasttext-src --strip-components=1

      - name: Patch setup.py for MSVC (replace GCC flags with MSVC equivalents)
        if: runner.os == 'Windows'
        shell: python
        run: |
          import re
          with open('fasttext-src/setup.py') as f:
              content = f.read()
          # MSVC uses /std:c++17 instead of -std=c++17, and doesn't support -fvisibility=hidden
          content = re.sub(
              r'extra_compile_args\s*=\s*\[[^\]]+\]',
              'extra_compile_args=["/std:c++17", "/d2FH4-"]',
              content,
          )
          with open('fasttext-src/setup.py', 'w') as f:
              f.write(content)

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: fasttext-src
          output-dir: wheelhouse
        env:
          CIBW_BUILD: "cp314-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_*"
          CIBW_ARCHS: ${{ matrix.archs }}
          # pybind11 ≥ 2.13 is required for Python 3.14 support.
          # fasttext 0.9.3 bundles pybind11 2.2.x which does not have Python 3.14
          # ABI markers and uses deprecated C API removed in Python 3.14.
          CIBW_BEFORE_BUILD: "pip install pybind11>=2.13"
          CIBW_BUILD_VERBOSITY: 1

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ matrix.archs }}
          path: wheelhouse/*.whl

  release:
    name: GitHub release
    needs: build_wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-*
          merge-multiple: true
          path: dist

      - name: List wheels
        run: ls -lh dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true
          body: |
            Pre-built fasttext ${{ env.FASTTEXT_VERSION }} wheels for **Python 3.14**.

            ## Install

            Download the `.whl` for your platform and install directly:

            ```bash
            pip install fasttext-<version>-cp314-cp314-<platform>.whl
            ```

            Or point pip at this release:

            ```bash
            pip install fasttext --find-links \
              https://github.com/Mokto/fasttext/releases/latest/download/
            ```

            ## Platforms

            | OS | Architecture |
            |---|---|
            | Linux (manylinux) | x86_64, aarch64 |
            | macOS | x86_64, arm64 |
            | Windows | AMD64 |
